# Pre-commit hooks for IndustrialAI.
#
# All Python tooling (ruff, mypy) runs through `uv run` so that the exact
# versions pinned in uv.lock are the single source of truth — there is no
# parallel set of hook revs to drift out of sync.
#
# Install once:   uv run pre-commit install
# Run manually:   uv run pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: mypy
        name: mypy (strict, src only)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
